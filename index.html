<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Khirad's Study Zone ✨</title>
<!-- PWA / installable app -->
<meta name="theme-color" content="#7c5cff" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Study Zone" />
<link rel="manifest" href="manifest.webmanifest" />
<link rel="icon" type="image/png" href="icon-192.png" />
<link rel="apple-touch-icon" href="apple-touch-icon.png" />
<style>
  :root{
    --bg1:#7c5cff; --bg2:#ff6ec7; --bg3:#36d1dc;
    --card:#ffffff; --ink:#2b2b4a; --muted:#7a7a9d;
    --good:#27d07f; --bad:#ff5b7a; --gold:#ffcf3f;
    --shadow:0 14px 40px rgba(40,20,90,.25);
    --radius:26px;
    --font:'Comic Sans MS','Trebuchet MS','Segoe UI',system-ui,sans-serif;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;padding:0;height:100%}
  body{
    font-family:var(--font); color:var(--ink);
    background:linear-gradient(135deg,var(--bg1),var(--bg2),var(--bg3));
    background-size:300% 300%; animation:flow 18s ease infinite;
    min-height:100%; overflow-x:hidden;
  }
  @keyframes flow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
  .blob{position:fixed;border-radius:50%;filter:blur(8px);opacity:.25;pointer-events:none;z-index:0}
  .b1{width:240px;height:240px;background:#fff;top:-60px;left:-40px;animation:bob 9s ease-in-out infinite}
  .b2{width:180px;height:180px;background:#ffe27a;bottom:-50px;right:-30px;animation:bob 11s ease-in-out infinite reverse}
  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(26px)}}
  .wrap{position:relative;z-index:2;max-width:780px;margin:0 auto;padding:18px 16px 60px}

  .topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;
    background:rgba(255,255,255,.18);backdrop-filter:blur(8px);border:2px solid rgba(255,255,255,.35);
    border-radius:20px;padding:10px 14px;color:#fff;margin-bottom:18px;}
  .brand{display:flex;align-items:center;gap:10px;font-weight:bold;font-size:20px}
  .brand .logo{font-size:28px;animation:spin 6s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .stats{display:flex;gap:8px}
  .pill{background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.4);
    border-radius:14px;padding:6px 12px;font-weight:bold;font-size:15px;white-space:nowrap}

  .screen{animation:pop .35s ease both}
  @keyframes pop{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
  .hero{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:26px 22px;text-align:center;margin-bottom:18px;}
  .hero h1{margin:6px 0 4px;font-size:30px}
  .hero p{margin:0;color:var(--muted);font-size:16px}
  .mascot{font-size:64px;animation:bob 3.5s ease-in-out infinite;display:inline-block}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
  @media(max-width:520px){.grid{grid-template-columns:1fr}}
  .tile{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;cursor:pointer;border:0;
    text-align:left;font-family:inherit;color:inherit;transition:transform .15s ease, box-shadow .15s ease;position:relative;overflow:hidden;}
  .tile:hover{transform:translateY(-5px) scale(1.02)}
  .tile:active{transform:scale(.98)}
  .tile .emoji{font-size:44px;display:block;margin-bottom:6px}
  .tile h3{margin:0 0 4px;font-size:20px}
  .tile small{color:var(--muted);font-size:14px}
  .tile .ribbon{position:absolute;top:12px;right:-30px;background:var(--gold);color:#5a4500;font-size:12px;font-weight:bold;padding:4px 34px;transform:rotate(40deg)}
  .tile.locked{opacity:.55;cursor:not-allowed}
  .tile.comp{background:linear-gradient(135deg,#e0ecff,#fff)}
  .tile.math{background:linear-gradient(135deg,#ffe6f3,#fff)}
  .tile.sci{background:linear-gradient(135deg,#e3fff0,#fff)}
  .barwrap{height:12px;background:#eee;border-radius:99px;overflow:hidden;margin-top:10px}
  .bar{height:100%;width:0;background:linear-gradient(90deg,var(--good),#7be0a8);border-radius:99px;transition:width .6s ease}

  .modegrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:8px}
  .btn{font-family:inherit;font-weight:bold;border:0;cursor:pointer;border-radius:16px;padding:12px 18px;font-size:16px;transition:transform .12s ease, filter .12s ease;}
  .btn:active{transform:scale(.96)}
  .btn:hover{filter:brightness(1.05)}
  .btn-primary{background:linear-gradient(135deg,#7c5cff,#a07bff);color:#fff;box-shadow:0 8px 20px rgba(124,92,255,.4)}
  .btn-ghost{background:#f1f0fb;color:var(--ink)}
  .btn-good{background:linear-gradient(135deg,var(--good),#5fe6a3);color:#fff}
  .btn-full{width:100%}
  .backbtn{background:rgba(255,255,255,.25);color:#fff;border:2px solid rgba(255,255,255,.4);border-radius:14px;padding:8px 14px;font-weight:bold;cursor:pointer;font-family:inherit;font-size:15px;margin-bottom:14px}

  /* flashcards */
  .flashstage{perspective:1400px;margin:10px 0}
  .flashcard{position:relative;width:100%;min-height:300px;cursor:pointer;transform-style:preserve-3d;transition:transform .6s cubic-bezier(.2,.8,.3,1);}
  .flashcard.flipped{transform:rotateY(180deg)}
  .face{position:absolute;inset:0;backface-visibility:hidden;border-radius:var(--radius);box-shadow:var(--shadow);padding:28px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;}
  .face.front{background:linear-gradient(135deg,#fff,#f3f0ff)}
  .face.back{background:linear-gradient(135deg,#fffaf0,#fff);transform:rotateY(180deg)}
  .face .label{position:absolute;top:14px;left:18px;font-size:13px;font-weight:bold;letter-spacing:1px;color:var(--muted)}
  .face .big{font-size:30px;font-weight:bold;margin:8px 0}
  .face .def{font-size:19px;line-height:1.5;color:#444}
  .face .tap{position:absolute;bottom:14px;font-size:13px;color:var(--muted)}
  .face .ic{font-size:54px;margin-bottom:8px}
  .navrow{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:14px}
  .counter{background:#fff;border-radius:14px;padding:8px 16px;font-weight:bold;box-shadow:var(--shadow)}

  /* quiz */
  .qcard{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:24px 22px}
  .qtop{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;color:var(--muted);font-weight:bold;font-size:14px}
  .qprog{height:10px;background:#eee;border-radius:99px;overflow:hidden;margin-bottom:18px}
  .qprog>div{height:100%;background:linear-gradient(90deg,var(--bg1),var(--bg2));transition:width .4s ease}
  .qtext{font-size:23px;font-weight:bold;margin:0 0 18px;line-height:1.35}
  .opts{display:grid;gap:12px}
  .opt{text-align:left;font-family:inherit;font-size:17px;font-weight:bold;color:var(--ink);background:#f6f5fd;border:3px solid transparent;border-radius:16px;padding:14px 16px;cursor:pointer;transition:transform .1s ease, background .2s ease, border-color .2s ease;display:flex;gap:12px;align-items:center;}
  .opt .key{width:30px;height:30px;flex:0 0 30px;border-radius:50%;background:#e3e0f7;display:grid;place-items:center;font-size:15px}
  .opt:hover:not(.done){transform:translateX(4px)}
  .opt.correct{background:#e4fbef;border-color:var(--good)}
  .opt.correct .key{background:var(--good);color:#fff}
  .opt.wrong{background:#ffeaef;border-color:var(--bad)}
  .opt.wrong .key{background:var(--bad);color:#fff}
  .opt.dim{opacity:.5}
  .feedback{margin-top:16px;font-size:17px;font-weight:bold;min-height:26px;text-align:center}
  .explain{margin-top:6px;background:#fff8e6;border:2px dashed var(--gold);border-radius:14px;padding:12px;font-size:15px;color:#6b5a00;display:none}

  /* written */
  textarea.wbox{width:100%;min-height:120px;border:3px solid #e3e0f7;border-radius:16px;padding:14px;font-family:inherit;font-size:17px;color:var(--ink);resize:vertical}
  textarea.wbox:focus{outline:none;border-color:var(--bg1)}
  .model{margin-top:14px;background:#eef9ff;border:2px dashed #36d1dc;border-radius:14px;padding:14px;font-size:16px;line-height:1.5;display:none}
  .model b{color:#0a7ea4}
  .keyrow{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
  .chipk{background:#e7e3fb;border-radius:99px;padding:4px 10px;font-size:13px;font-weight:bold;color:#5a47b0}
  .chipk.hit{background:#cdeedd;color:#127a4b}

  /* picture lessons */
  .learnwrap{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px}
  .learnwrap h3{margin:0 0 4px;font-size:22px;text-align:center}
  .learnwrap .intro{color:var(--muted);text-align:center;margin:0 0 12px;font-size:15px}
  .stage{background:linear-gradient(135deg,#fbfaff,#eef6ff);border-radius:18px;padding:10px;display:flex;justify-content:center}
  .stage svg{max-width:100%;height:auto}
  .hot{cursor:pointer;transition:all .2s ease}
  .hot.active{filter:drop-shadow(0 0 6px #ff5b7a)}
  .chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-top:14px}
  .chip{font-family:inherit;font-weight:bold;font-size:15px;border:2px solid #d9d4f5;background:#f6f4ff;color:#5a47b0;border-radius:99px;padding:8px 14px;cursor:pointer;transition:all .15s ease}
  .chip:hover{transform:translateY(-2px)}
  .chip.active{background:linear-gradient(135deg,#7c5cff,#a07bff);color:#fff;border-color:transparent}
  .factbox{margin-top:14px;min-height:60px;background:#fff8e6;border:2px dashed var(--gold);border-radius:16px;padding:14px;font-size:17px;line-height:1.5;color:#6b5a00;text-align:center}
  .factbox .ph{color:#b6a96a}

  /* learn tables */
  .pvtable{width:100%;border-collapse:collapse;margin:6px 0;font-size:15px}
  .pvtable th,.pvtable td{border:2px solid #e0d9f7;padding:8px 6px;text-align:center}
  .pvtable th{background:#efeaff;color:#5a47b0}
  .pvtable .num{font-size:22px;font-weight:bold;color:var(--bg1)}
  .rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(70px,1fr));gap:8px;margin-top:8px}
  .rg .rcell{background:#f6f4ff;border:2px solid #e0d9f7;border-radius:12px;padding:8px;text-align:center}
  .rg .rcell b{font-size:18px;color:var(--bg1);display:block}
  .ladder{display:flex;flex-direction:column;gap:6px;margin-top:6px}
  .rung{display:flex;justify-content:space-between;align-items:center;background:linear-gradient(90deg,#f0ecff,#fff);border-left:6px solid var(--bg1);border-radius:10px;padding:10px 14px;font-weight:bold}
  .rung small{color:var(--muted);font-weight:normal}
  .twocol{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:6px}
  @media(max-width:520px){.twocol{grid-template-columns:1fr}}
  .infocard{background:#f6f4ff;border-radius:14px;padding:12px;font-size:15px}
  .infocard h4{margin:0 0 6px;color:var(--bg1)}

  /* results / badges */
  .result{background:var(--card);border-radius:var(--radius);box-shadow:var(--shadow);padding:30px 22px;text-align:center}
  .result .score{font-size:60px;font-weight:bold;margin:6px 0}
  .stars{font-size:44px;letter-spacing:6px;margin:10px 0}
  .badgewrap{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-top:10px}
  .badge{background:var(--card);border-radius:18px;box-shadow:var(--shadow);padding:16px 10px;text-align:center}
  .badge .bi{font-size:40px;filter:grayscale(1);opacity:.35}
  .badge.unlocked .bi{filter:none;opacity:1;animation:bob 3s ease-in-out infinite}
  .badge small{display:block;color:var(--muted);margin-top:4px;font-size:12px}
  .badge b{font-size:14px}
  #confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
  .hint{color:#fff;text-align:center;opacity:.85;margin:8px 0 0;font-size:14px}
  .center{text-align:center}
  h2.sec{color:#fff;margin:6px 0 12px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
  .subtitle{color:#fff;opacity:.92;margin:-6px 0 14px;text-align:center}

  /* language helpers (Hindi / Telugu) */
  .tile.hin{background:linear-gradient(135deg,#ffe9d6,#fff)}
  .tile.tel{background:linear-gradient(135deg,#fde2ff,#fff)}
  .lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(96px,1fr));gap:8px;margin:10px 0}
  .lcell{background:linear-gradient(135deg,#fff,#f3f0ff);border:2px solid #e0d9f7;border-radius:14px;padding:8px 6px;text-align:center}
  .lcell .ch{font-size:30px;font-weight:bold;color:var(--bg1);line-height:1.15}
  .lcell .rom{font-size:13px;color:#a07bff;font-weight:bold}
  .lcell .ex{font-size:14px;color:#444;margin-top:3px;display:block}
  .lcell .mn{font-size:12px;color:var(--muted);display:block}
  .romline{font-size:18px;color:#a07bff;font-weight:bold;margin:2px 0 6px}
  .startnote{background:#fff3d6;border:2px dashed var(--gold);border-radius:14px;padding:10px 14px;color:#6b5a00;font-size:14px;margin:0 0 12px;text-align:center;line-height:1.5}
  .examnote{background:#ffeede;border:2px dashed #ff8c42;border-radius:14px;padding:12px 16px;color:#8a3b00;font-size:14.5px;margin:0 0 16px;text-align:center;line-height:1.6}
  .dictword{text-align:center;font-size:46px;font-weight:800;color:var(--ink);margin:6px 0 2px;line-height:1.2}
  .dinput{width:100%;border:3px solid #e3e0f7;border-radius:16px;padding:14px;font-family:inherit;font-size:18px;color:var(--ink);margin-top:10px;box-sizing:border-box}
  .dinput:focus{outline:none;border-color:#a07bff}
  .bara{border-collapse:collapse;margin:8px auto;font-size:15px}
  .bara td{border:2px solid #e8e2fb;padding:6px 5px;text-align:center;white-space:nowrap}
  .bara .base{background:#efeaff;color:#5a47b0;font-weight:bold;font-size:19px}
  .bara .rom{color:#a07bff;font-size:10px;display:block;font-weight:bold}

  /* write on paper (photo upload + AI check) */
  #ppreview{margin-top:12px;text-align:center}
  #ppreview img{max-width:100%;max-height:320px;border-radius:16px;border:3px solid #e3e0f7;box-shadow:var(--shadow)}
  .evalcard{margin-top:14px;background:linear-gradient(135deg,#fffaf0,#fff);border:2px solid var(--gold);border-radius:18px;padding:16px}
  .evalcard .er{margin:8px 0;font-size:16px;line-height:1.5}
  .evalcard .er b{color:#0a7ea4}
  .readbox{background:#f6f4ff;border-radius:12px;padding:10px;font-size:18px;margin:6px 0;line-height:1.5}
  .spin{width:36px;height:36px;border:4px solid #e3e0f7;border-top-color:var(--bg1);border-radius:50%;animation:sp 1s linear infinite;margin:12px auto}
  @keyframes sp{to{transform:rotate(360deg)}}
  .keyinput{width:100%;border:3px solid #e3e0f7;border-radius:14px;padding:12px;font-family:inherit;font-size:15px;color:var(--ink)}
  .keyinput:focus{outline:none;border-color:var(--bg1)}
  .notebox{background:#eef9ff;border:2px dashed #36d1dc;border-radius:14px;padding:12px;font-size:14px;color:#0a7ea4;line-height:1.55;text-align:left}
  .notebox b{color:#086a8c}

  /* quiz lock + 5-minute game */
  .lockmsg{background:#ffeaef;border:2px dashed var(--bad);border-radius:14px;padding:12px;color:#a3203a;font-size:15px;line-height:1.5;margin-bottom:10px}
  .gametop{display:flex;gap:8px;justify-content:center;margin-bottom:8px}
  .gpill{background:#fff;border-radius:14px;padding:8px 14px;font-weight:bold;box-shadow:var(--shadow);font-size:16px}
  .gbar{height:14px;background:rgba(255,255,255,.5);border-radius:99px;overflow:hidden;margin-bottom:12px;border:2px solid rgba(255,255,255,.6)}
  .gbar>div{height:100%;width:100%;background:linear-gradient(90deg,#27d07f,#ffcf3f,#ff5b7a);transition:width 1s linear}
  .balloonwrap{position:relative;height:58vh;min-height:360px;background:linear-gradient(#cdeeff,#eaf7ff);border-radius:18px;overflow:hidden;box-shadow:var(--shadow);touch-action:none}
  .balloonwrap canvas{width:100%;height:100%;display:block;cursor:pointer}

  /* parent-password approval modal */
  .pmodal{position:fixed;inset:0;z-index:80;background:rgba(40,20,90,.45);display:flex;align-items:center;justify-content:center;padding:20px}
  .pbox{background:#fff;border-radius:20px;box-shadow:var(--shadow);padding:22px;max-width:340px;width:100%;text-align:center}
  .pbox h3{margin:6px 0}
  .pbox .modegrid{margin-top:12px}

  /* Hindi word-by-word meanings */
  .wmline{background:#f4f7ff;border:1px dashed #b9c6f0;border-radius:12px;padding:8px 10px;margin:8px 0 0;font-size:14px;color:#3a4a7a;line-height:1.65}
  .omn{opacity:.72;font-weight:normal}
</style>
</head>
<body>
<div class="blob b1"></div><div class="blob b2"></div>
<canvas id="confetti"></canvas>
<div class="wrap">
  <div class="topbar">
    <div class="brand"><span class="logo">🌟</span><span>Khirad's Study Zone</span></div>
    <div class="stats"><span class="pill" id="starPill">⭐ 0</span><span class="pill" id="badgePill">🏅 0</span></div>
  </div>
  <div id="app"></div>
  <p class="hint">Made with ❤️ for Khirad · Your progress saves automatically</p>
</div>

<script>
/* =======================================================================
   PICTURE LESSON DIAGRAMS  (each returns {body, parts})
   ======================================================================= */
const arrowDef = '<defs><marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="currentColor"/></marker></defs>';

function dot(id,x,y){ return `<circle id="dot-${id}" class="hot" cx="${x}" cy="${y}" r="11" fill="#fff" stroke="#7c5cff" stroke-width="3"/>`; }

/* letter chart helpers (used by Hindi / Telugu alphabet lessons) */
function lgrid(arr){ return '<div class="lgrid">'+arr.map(L=>
  '<div class="lcell"><div class="ch">'+L.ch+'</div><div class="rom">'+L.rom+'</div>'+
  (L.ex?'<span class="ex">'+L.ex+'</span>':'')+
  (L.mn?'<span class="mn">'+L.mn+'</span>':'')+'</div>').join('')+'</div>'; }
function baraTable(rows){ return '<div style="overflow-x:auto"><table class="bara"><tbody>'+rows.map(r=>
  '<tr><td class="base">'+r.base+'<span class="rom">'+r.brom+'</span></td>'+
  r.cells.map(c=>'<td>'+c[0]+'<span class="rom">'+c[1]+'</span></td>').join('')+'</tr>').join('')+'</tbody></table></div>'; }

/* =======================================================================
   HINDI WORD-BY-WORD MEANINGS  (every Hindi word → English, shown under Qs)
   ======================================================================= */
const HIN = {
"है":"is","का":"of","के":"of","हैं":"are","से":"from","शब्द":"word","गिनती":"counting","त्योहार":"festival",
"संज्ञा":"noun","किस":"which","क्या":"what","दिन":"day","लिखो":"write","कौन-सा":"which one","खुशी":"happiness",
"पर":"on","तक":"up to","नाम":"name","में":"in","असम":"Assam","की":"of","केरल":"Kerala","तीन":"three",
"पंजाब":"Punjab","प्रकाश":"light","विलोम":"opposite","सर्वनाम":"pronoun","कहते":"call","किसी":"any","जाता":"is",
"मनाया":"celebrated","या":"or","राज्य":"state","रात":"night","राखी":"Rakhi","सप्ताह":"week","सुख":"comfort",
"अच्छाई":"goodness","ईद":"Eid","उदासी":"sadness","उपसर्ग":"prefix","ओणम":"Onam","और":"and","कब":"when",
"करते":"do","कारक":"case-marker","कितने":"how many","किसे":"what","को":"to","कोई":"any","क्रिसमस":"Christmas",
"गोवा":"Goa","जातिवाचक":"common (noun)","तमिलनाडु":"Tamil Nadu","तितली":"butterfly","दशहरा":"Dussehra",
"दीपावली":"Diwali","दुख":"sorrow","ने":"(by)","पर्यायवाची":"synonym","पोंगल":"Pongal","प्रकार":"kind","प्रेम":"love",
"बहुवचन":"plural","भाई":"brother","भाववाचक":"abstract (noun)","मिठास":"sweetness","रंग":"colour","रंगों":"colours",
"रक्षाबंधन":"Rakshabandhan","वाले":"which (come)","विदेश":"foreign land","व्यक्ति":"person","व्यक्तिवाचक":"proper (noun)",

const HDIG={'०':'0','१':'1','२':'2','३':'3','४':'4','५':'5','६':'6','७':'7','८':'8','९':'9'};
function gloss1(w){
  w=w.replace(/^[\s'"“”‘’।॥,.?:()…\-—]+/,'').replace(/[\s'"“”‘’।॥,.?:()…\-—]+$/,'');
  if(!w) return null;
  if(/^[०-९]+$/.test(w)) return {w, m:w.split('').map(c=>HDIG[c]).join('')};
  return {w, m: HIN[w]||null};
}
function glossHin(text){
  const out=[], seen=new Set();
  (text||'').split(/\s+/).forEach(tk=>{ if(!/[ऀ-ॿ]/.test(tk)) return;
    const g=gloss1(tk); if(g && g.m && !seen.has(g.w)){ seen.add(g.w); out.push(g.w+' ('+g.m+')'); } });
  return out.join(' · ');
}
function glossMean(text){
  if(/[A-Za-z]/.test(text||'')) return '';
  const out=[], seen=new Set();
  (text||'').split(/\s+/).forEach(tk=>{ if(!/[ऀ-ॿ]/.test(tk)) return;
    const g=gloss1(tk); if(g && g.m && !seen.has(g.w)){ seen.add(g.w); out.push(g.m); } });
  return out.join(' · ');
}
function wmLine(text){ const g=glossHin(text); return g?'<div class="wmline">📖 '+g+'</div>':''; }
function optGloss(t){ const m=glossMean(t); return m?' <small class="omn">('+m+')</small>':''; }

/* hint system: translation is hidden until the 💡 Hint button; 3 hints then locked */
let CURQTEXT='', CUROPTS=null, HINTSUBJ='', HINTBACK=null, SHOWEN=false;
function splitQ(q){ const m=(q||'').match(/^([\s\S]*?)\s*(\([^()]*[A-Za-z][^()]*\))\s*[।.]?\s*$/); return m?{hi:m[1].trim(), en:m[2]}:{hi:q, en:''}; }
function qHidden(q){ if(SHOWEN) return q; return glossHin(q)?splitQ(q).hi:q; }
function ansHintCtl(){
  if(!CUROPTS || !CUROPTS.some(t=>glossMean(t))) return '';   // only when options are Hindi-only
  const used=S.hintsUsed||0, left=3-used;
  if(used>=3) return '<div id="hintzone"><button class="btn btn-ghost btn-full" style="margin-top:8px" onclick="startHintGate()">🔒 Answer hints locked — write by hand to unlock ✍️</button></div>';
  return '<div id="hintzone"><button class="btn btn-ghost btn-full" id="hintbtn" style="margin-top:8px" onclick="revealHint()">💡 Show answer meanings ('+left+' hint'+(left===1?'':'s')+' left)</button></div>';
}
function revealHint(){
  if((S.hintsUsed||0)>=3) return startHintGate();
  S.hintsUsed=(S.hintsUsed||0)+1; save();
  if(CUROPTS){ CUROPTS.forEach((t,idx)=>{ const b=document.getElementById('opt'+idx); if(b){ const sp=b.querySelector('span:last-child'); const g=optGloss(t); if(sp && g && !sp.querySelector('.omn')) sp.insertAdjacentHTML('beforeend', g); } }); }
  const btn=document.getElementById('hintbtn'); if(btn) btn.style.display='none';
  const z=document.getElementById('hintzone');
  if(z && (S.hintsUsed||0)>=3) z.insertAdjacentHTML('beforeend','<div style="text-align:center;color:#c98a00;font-weight:bold;margin-top:6px;font-size:14px">That was your last hint — the next needs a handwriting unlock. ✍️</div>');
}
function startHintGate(){ startGate('hint'); }
function resumeHint(){ if(typeof HINTBACK==='function') HINTBACK(); else home(); }

      <div class="rg">${grid}</div>
      <div class="twocol" style="margin-top:14px">
        <div class="infocard"><h4>➖ Smaller BEFORE bigger = subtract</h4>IV = 5−1 = <b>4</b><br>IX = 10−1 = <b>9</b><br>XL = 50−10 = <b>40</b></div>
        <div class="infocard"><h4>➕ Smaller AFTER bigger = add</h4>VI = 5+1 = <b>6</b><br>XI = 10+1 = <b>11</b><br>LX = 50+10 = <b>60</b></div>
      </div>`;
    return {body, parts:[
      {id:'',label:'🔁 Repeat rule',desc:'I, X, C and M can be repeated up to 3 times (III = 3). But V, L and D are NEVER repeated.'},
      {id:'',label:'Example: 73',desc:'73 = 70 + 3 = LXX + III = LXXIII.'},
      {id:'',label:'Example: 96',desc:'96 = 90 + 6 = XC + VI = XCVI. (90 = XC because 100−10.)'},
    ]};
  },

/* --- reward rules: no star/badge for the SAME question twice --- */
function qid(item){ const s=(item&&item.q)||''; let h=0; for(let i=0;i<s.length;i++){ h=(h*31+s.charCodeAt(i))|0; } return 'q'+(h>>>0).toString(36); }
function starOnce(item, n){ const id=qid(item); if(S.starredQ[id]) return false; S.starredQ[id]=true; addStars(n); save();
  const c=Object.keys(S.starredQ).length; if(c>=25) unlock('sharp'); if(c>=50) unlock('scholar'); return true; }
/* a passed handwriting question gives ONE 5-minute game (once per unique question) */
function passHandwriting(item){ const id=qid(item); const freshQ=!S.handDone[id];
  if(freshQ){ S.handDone[id]=true; S.gameTokens=(S.gameTokens||0)+1; }
  S.handPassed=(S.handPassed||0)+1; save(); unlock('penpal'); return freshQ; }
function accuracyOf(item, ans){ const a=(ans||'').toLowerCase();
  const ks=item.keywords||[]; if(!ks.length) return a.length>=3?100:0;
  const hit=ks.filter(kw=>kw.split('|').some(x=>a.includes(x.toLowerCase()))).length;
  return Math.round(100*hit/ks.length); }

function fileToScaledJpeg(file, maxEdge, quality){
  return new Promise((res,rej)=>{
    const url=URL.createObjectURL(file), img=new Image();
    img.onload=()=>{ let w=img.width,h=img.height; const s=Math.min(1, maxEdge/Math.max(w,h));
      const cw=Math.max(1,Math.round(w*s)), ch=Math.max(1,Math.round(h*s));
      const c=document.createElement('canvas'); c.width=cw; c.height=ch;
      c.getContext('2d').drawImage(img,0,0,cw,ch); URL.revokeObjectURL(url);
      try{ res(c.toDataURL('image/jpeg', quality)); }catch(e){ rej(e); } };
    img.onerror=()=>{ URL.revokeObjectURL(url); rej(new Error('Could not read that image.')); };
    img.src=url;
  });

function paperEvalBody(item, base64, subjName){
  const keys=(item.keywords||[]).map(k=>k.split('|')[0]).join(', ');
  const userText="Subject: "+subjName+".\nQuestion: "+item.q+"\nExpected answer: "+item.model+"\nKey points she should include: "+keys;
  return {
    model: AI_MODEL, max_tokens: 1024,
    thinking: { type:"adaptive" },
    output_config: { effort:"medium", format:{ type:"json_schema", schema: EVAL_SCHEMA } },
    system: EVAL_SYSTEM,
    messages: [{ role:"user", content:[
      { type:"image", source:{ type:"base64", media_type:"image/jpeg", data: base64 } },
      { type:"text", text: userText }
    ]}]
  };

async function aiCheck(item, dataUrl, subjName){
  const key=getKey(); if(!key) throw new Error("nokey");
  const base64=dataUrl.split(',')[1];
  const resp=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{ "Content-Type":"application/json","x-api-key":key,
      "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true" },
    body: JSON.stringify(paperEvalBody(item, base64, subjName))
  });
  if(!resp.ok){ let msg="HTTP "+resp.status; try{ const j=await resp.json(); if(j && j.error && j.error.message) msg=j.error.message; }catch(e){} const er=new Error(msg); er.http=resp.status; throw er; }
  const data=await resp.json();
  if(data.stop_reason==="refusal") throw new Error("Sorry, I couldn’t check that one.");
  const tb=(data.content||[]).find(b=>b.type==="text");
  if(!tb) throw new Error("Empty reply from the checker.");
  return JSON.parse(tb.text);
}

   GAME ZONE  (each handwriting pass = one 5-minute learning game)
   ======================================================================= */
let GAME=null, gameTimer=null, gameRAF=null;
function gameZone(){
  const t=S.gameTokens||0;
  go(`<div class="screen">
    <button class="backbtn" onclick="home()">← Home</button>
    <h2 class="sec">🎮 Game Zone</h2>

      <p style="color:var(--muted)">Best score: ${S.bestGame||0} 🎈</p>
      ${t>0
        ? `<p>Your reward: <b>Balloon Pop</b>! 🎈 Tap the balloons to pop them — gold ⭐ and rainbow 🌈 ones give bonus points. Just relax and have fun!</p>
           <button class="btn btn-good btn-full" onclick="startGame()">▶️ Play Balloon Pop 🎈</button>`
        : `<div class="notebox" style="margin-top:8px;text-align:left">🔑 To earn a game, pass a <b>Write on Paper</b> (handwriting) question — or beat the <b>3-mistake unlock challenge</b> in a quiz. Each one you pass gives one game! 💛</div>`}
    </div></div>`);
}
function startGame(){
  if((S.gameTokens||0)<1) return gameZone();
  S.gameTokens--; S.gamesPlayed=(S.gamesPlayed||0)+1; save(); unlock('gamer');
  go(`<div class="screen">
    <button class="backbtn" onclick="finishGame()">← Done</button>
    <h2 class="sec">🎈 Balloon Pop</h2>
    <div class="gametop"><span class="gpill" id="gscore">🎈 0</span><span class="gpill">👆 Tap to pop!</span></div>
    <div class="balloonwrap"><canvas id="balloons"></canvas></div>
    <button class="btn btn-primary btn-full" style="margin-top:12px" onclick="finishGame()">🏁 I'm done</button>
  </div>`);
  initBalloons();
}
function initBalloons(){
  const canvas=document.getElementById('balloons'); if(!canvas) return;
  const wrap=canvas.parentElement, W=wrap.clientWidth||340, H=wrap.clientHeight||420;
  canvas.width=W; canvas.height=H;
  GAME={ balloons:[], particles:[], score:0, w:W, h:H, ctx:canvas.getContext('2d'), canvas, last:0, spawnAcc:0, t:0 };
  for(let i=0;i<7;i++) spawnBalloon(true);
  canvas.addEventListener('pointerdown', balloonTap);
  gameRAF=requestAnimationFrame(balloonLoop);
}
function balloonTap(e){
  if(!GAME) return; e.preventDefault(); const rect=GAME.canvas.getBoundingClientRect();
  const cx=(e.clientX!=null?e.clientX:(e.touches&&e.touches[0].clientX))-rect.left;
  const cy=(e.clientY!=null?e.clientY:(e.touches&&e.touches[0].clientY))-rect.top;
  for(let i=GAME.balloons.length-1;i>=0;i--){ const b=GAME.balloons[i], rw=b.r*0.82, rh=b.r, dx=(cx-b.x)/rw, dy=(cy-b.y)/rh;
    if(dx*dx+dy*dy<=1.15){ popBalloon(i); return; } }
}
function spawnBalloon(seed){
  if(!GAME) return; const r=26+Math.random()*22;
  const hues=[0,28,50,150,200,265,320];
  const roll=Math.random(), kind = roll<0.07?'gold' : roll<0.12?'rainbow':'normal';
  GAME.balloons.push({ x:r+Math.random()*(GAME.w-2*r), y: seed? GAME.h*0.35+Math.random()*GAME.h*0.55 : GAME.h+r+12,
    r, vy:24+Math.random()*34, hue:hues[Math.floor(Math.random()*hues.length)], phase:Math.random()*6.28, sway:0.5+Math.random()*0.7, kind });
}
function balloonLoop(ts){
  if(!GAME) return;
  if(!GAME.last) GAME.last=ts; let dt=(ts-GAME.last)/1000; GAME.last=ts; if(dt>0.05) dt=0.05;
  GAME.t+=dt; GAME.spawnAcc+=dt;
  const interval=Math.max(0.4, 0.85 - GAME.score*0.004);
  if(GAME.spawnAcc>interval && GAME.balloons.length<22){ GAME.spawnAcc=0; spawnBalloon(false); }
  for(const b of GAME.balloons){ b.y-=b.vy*dt; b.x+=Math.sin(GAME.t*b.sway+b.phase)*0.4; }
  GAME.balloons=GAME.balloons.filter(b=> b.y > -b.r-24);
  for(const p of GAME.particles){ p.vy+=320*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt; }
  GAME.particles=GAME.particles.filter(p=>p.life>0);
  drawGame();
  gameRAF=requestAnimationFrame(balloonLoop);
}
function drawGame(){
  const ctx=GAME.ctx; ctx.clearRect(0,0,GAME.w,GAME.h);
  for(const b of GAME.balloons) drawBalloon(ctx,b);
  for(const p of GAME.particles){ ctx.globalAlpha=Math.max(0,Math.min(1,p.life*2)); ctx.fillStyle=p.color; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,6.29); ctx.fill(); }
  ctx.globalAlpha=1;
}
function drawBalloon(ctx,b){
  const rw=b.r*0.82, rh=b.r;
  ctx.strokeStyle='rgba(120,120,140,.45)'; ctx.lineWidth=1.5; ctx.beginPath(); ctx.moveTo(b.x,b.y+rh); ctx.quadraticCurveTo(b.x+7,b.y+rh+15,b.x,b.y+rh+28); ctx.stroke();
  let fill;
  if(b.kind==='gold'){ const g=ctx.createLinearGradient(b.x-rw,b.y-rh,b.x+rw,b.y+rh); g.addColorStop(0,'#ffe98a'); g.addColorStop(1,'#f5b301'); fill=g; }
  else if(b.kind==='rainbow'){ const g=ctx.createLinearGradient(b.x-rw,b.y-rh,b.x+rw,b.y+rh); g.addColorStop(0,'#ff6ec7'); g.addColorStop(.5,'#ffd23f'); g.addColorStop(1,'#36d1dc'); fill=g; }
  else fill='hsl('+b.hue+',75%,62%)';
  ctx.fillStyle=fill; ctx.beginPath(); ctx.ellipse(b.x,b.y,rw,rh,0,0,6.29); ctx.fill();
  ctx.beginPath(); ctx.moveTo(b.x-4,b.y+rh-2); ctx.lineTo(b.x+4,b.y+rh-2); ctx.lineTo(b.x,b.y+rh+7); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.45)'; ctx.beginPath(); ctx.ellipse(b.x-rw*0.34,b.y-rh*0.42,rw*0.22,rh*0.3,-0.4,0,6.29); ctx.fill();
  if(b.kind!=='normal'){ ctx.font=(b.r*0.95)+'px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillText(b.kind==='gold'?'⭐':'🌈', b.x, b.y+1); }
}
function burstParticles(x,y,col,n){
  for(let k=0;k<n;k++){ const a=Math.random()*6.29, sp=70+Math.random()*130; GAME.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-50,life:0.5+Math.random()*0.35,size:3+Math.random()*3,color:col}); }
}
function popBalloon(i){
  const b=GAME.balloons[i]; if(!b) return;
  const pts=b.kind==='gold'?5 : b.kind==='rainbow'?3 : 1; GAME.score+=pts;
  const col=b.kind==='gold'?'#f5b301':b.kind==='rainbow'?'#ff6ec7':'hsl('+b.hue+',75%,60%)';
  burstParticles(b.x,b.y,col,12);
  GAME.balloons.splice(i,1);
  if(b.kind==='rainbow'){ for(let j=GAME.balloons.length-1;j>=0;j--){ const o=GAME.balloons[j]; if(Math.hypot(o.x-b.x,o.y-b.y)<b.r*3.2){ GAME.score++; burstParticles(o.x,o.y,'hsl('+o.hue+',75%,60%)',7); GAME.balloons.splice(j,1); } } }
  const gs=document.getElementById('gscore'); if(gs) gs.textContent='🎈 '+GAME.score;
  if(pts>=3) miniBurst();
}
function finishGame(){
  clearGame();
  const sc=GAME?GAME.score:0, prevBest=S.bestGame||0, isBest=sc>prevBest;
  if(isBest) S.bestGame=sc; save(); GAME=null;
  go(`<div class="screen"><div class="result"><span class="mascot">🎈</span><h1>Great popping!</h1>
    <div class="score">${sc}</div>
    <p>${isBest?'New best score! 🏆':'Your best is '+(S.bestGame||0)+' 🎈'}</p>
    <div style="margin-top:16px"><button class="btn btn-good" onclick="gameZone()">🎮 Game Zone</button>
    <button class="btn btn-ghost" onclick="home()">🏠 Home</button></div>
    <p style="color:var(--muted);margin-top:12px">Earn another game by passing a handwriting question! ✍️</p>
  </div></div>`);
}
function clearGame(){ if(gameTimer){ clearInterval(gameTimer); gameTimer=null; } if(gameRAF){ cancelAnimationFrame(gameRAF); gameRAF=null; } }
function quitGame(){ clearGame(); GAME=null; home(); }

/* =======================================================================
   PARENT PASSWORD  (approve handwriting passes; master password = Shaista@123)
   ======================================================================= */
const MASTER_PWD = "Shaista@123";
const PWD_STORE  = "khiradStudyZone_pwd";
function pwdHash(p){ let h=5381; for(let i=0;i<p.length;i++){ h=((h<<5)+h+p.charCodeAt(i))|0; } return 'h'+(h>>>0).toString(36); }
function hasPwd(){ try{ return !!localStorage.getItem(PWD_STORE); }catch(e){ return false; } }
function setPwd(p){ try{ localStorage.setItem(PWD_STORE, pwdHash(p)); }catch(e){} }
function checkPwd(p){ if(p===MASTER_PWD) return true; try{ const s=localStorage.getItem(PWD_STORE); return !!s && s===pwdHash(p); }catch(e){ return false; } }
function askParent(onApproved){
  if(!hasPwd()){ onApproved(); return; }              // no password set yet → honour system
  const ov=document.createElement('div'); ov.className='pmodal';
  ov.innerHTML=`<div class="pbox">
    <div style="font-size:40px">🔒</div>
    <h3>Parent check</h3>
    <p style="color:var(--muted);font-size:14px;margin:4px 0 10px">A grown-up: please check Khirad's written answer, then enter the password to approve.</p>
    <input class="keyinput" id="ppwd" type="password" placeholder="Parent password" autocomplete="off">
    <div id="pperr" style="color:var(--bad);font-weight:bold;min-height:18px;font-size:13px;margin-top:6px"></div>
    <div class="modegrid">
      <button class="btn btn-good" id="pok">✅ Approve</button>
      <button class="btn btn-ghost" id="pcancel">Cancel</button>
    </div></div>`;
  document.body.appendChild(ov);
  const close=()=>{ try{ ov.remove(); }catch(e){} };
  const submit=()=>{ const v=ov.querySelector('#ppwd').value||''; if(checkPwd(v)){ close(); onApproved(); } else { ov.querySelector('#pperr').textContent='Wrong password — try again.'; } };
  ov.querySelector('#pcancel').onclick=close;
  ov.querySelector('#pok').onclick=submit;
  ov.querySelector('#ppwd').addEventListener('keydown',e=>{ if(e.key==='Enter') submit(); });
  setTimeout(()=>{ const t=ov.querySelector('#ppwd'); if(t) t.focus(); },100);
}

function addStars(n){ S.stars+=n; save(); if(S.stars>=10)unlock('star10'); if(S.stars>=50)unlock('star50'); }
let toastTimer;
function toastBadge(id){
  const b=BADGES.find(x=>x.id===id); if(!b) return;

const cv=document.getElementById('confetti'), ctx=cv.getContext('2d');
let parts=[],raf=null;
function resize(){cv.width=innerWidth;cv.height=innerHeight;} addEventListener('resize',resize); resize();
const COLORS=['#ff5b7a','#ffcf3f','#27d07f','#36d1dc','#7c5cff','#ff6ec7'];
function spawn(n,cx,cy){ for(let i=0;i<n;i++){ parts.push({x:cx,y:cy,vx:(Math.random()-0.5)*9,vy:(Math.random()*-9)-3,g:0.28+Math.random()*0.12,s:6+Math.random()*7,c:COLORS[(i+parts.length)%COLORS.length],rot:Math.random()*6,vr:(Math.random()-0.5)*0.4,life:90+Math.random()*40}); } if(!raf)raf=requestAnimationFrame(tick); }
function burst(){ spawn(120, cv.width/2, cv.height*0.32); }
function miniBurst(){ spawn(28, cv.width/2, cv.height*0.4); }
function tick(){ ctx.clearRect(0,0,cv.width,cv.height); parts.forEach(p=>{ p.vy+=p.g;p.x+=p.vx;p.y+=p.vy;p.rot+=p.vr;p.life--; ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);ctx.fillStyle=p.c;ctx.fillRect(-p.s/2,-p.s/2,p.s,p.s*0.6);ctx.restore(); }); parts=parts.filter(p=>p.life>0&&p.y<cv.height+40); if(parts.length)raf=requestAnimationFrame(tick); else{raf=null;ctx.clearRect(0,0,cv.width,cv.height);} }

function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

refreshTop(); home();

<button id="pwaInstall" style="display:none;position:fixed;right:14px;bottom:14px;z-index:60;font-family:var(--font);font-weight:bold;font-size:16px;border:0;cursor:pointer;border-radius:16px;padding:12px 18px;color:#fff;background:linear-gradient(135deg,#27d07f,#5fe6a3);box-shadow:0 8px 22px rgba(20,120,70,.45)">⬇️ Install app</button>
<script>
  let deferredPrompt = null;
  const installBtn = document.getElementById('pwaInstall');
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault();
    deferredPrompt = e;
    installBtn.style.display = 'block';
  });
  installBtn.addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt();
    await deferredPrompt.userChoice;
    deferredPrompt = null;
    installBtn.style.display = 'none';
  });
  window.addEventListener('appinstalled', () => { installBtn.style.display = 'none'; });
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>
